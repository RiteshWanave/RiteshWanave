<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Linux distro ASCII art animation</title>
<desc>Animated SVG cycling through ASCII art logos of Arch, Ubuntu, Fedora, Debian, Manjaro, Kali, and Mint Linux</desc>

<defs>
<style>
.mono { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
.label { font-family: 'Courier New', Courier, monospace; font-size: 11px; letter-spacing: 1px; }
.distro-frame { opacity: 0; animation: show 20s infinite step-start; }
.f1 { animation-delay: 0s;      opacity: 1; }
.f2 { animation-delay: 2.857s;  opacity: 0; }
.f3 { animation-delay: 5.714s;  opacity: 0; }
.f4 { animation-delay: 8.571s;  opacity: 0; }
.f5 { animation-delay: 11.428s; opacity: 0; }
.f6 { animation-delay: 14.285s; opacity: 0; }
.f7 { animation-delay: 17.142s; opacity: 0; }
@keyframes show {
  0%   { opacity: 1; }
  14%  { opacity: 0; }
  100% { opacity: 0; }
}
</style>
</defs>

<rect width="680" height="220" fill="#0d1117" rx="10"/>
<circle cx="28" cy="22" r="6" fill="#ff5f57"/>
<circle cx="48" cy="22" r="6" fill="#febc2e"/>
<circle cx="68" cy="22" r="6" fill="#28c840"/>
<text x="340" y="27" text-anchor="middle" class="label" fill="#8b949e">~ i-use-linux-btw —</text>
<line x1="0" y1="40" x2="680" y2="40" stroke="#21262d" stroke-width="1"/>

<g class="distro-frame f1">
  <text class="mono" x="225" y="68"  fill="#1793d1">      /\      </text>
  <text class="mono" x="225" y="85"  fill="#1793d1">     /  \     </text>
  <text class="mono" x="225" y="102" fill="#1793d1">    /\    \   </text>
  <text class="mono" x="225" y="119" fill="#1793d1">   /  __  \  </text>
  <text class="mono" x="225" y="136" fill="#1793d1">  / /    \ \ </text>
  <text class="mono" x="225" y="153" fill="#1793d1"> /_/      \_\</text>
  <text class="mono" x="340" y="185" fill="#8b949e" text-anchor="middle">Arch Linux — btw</text>
</g>

<g class="distro-frame f2">
  <text class="mono" x="215" y="68"  fill="#e95420">          _         </text>
  <text class="mono" x="215" y="85"  fill="#e95420">      ---(_)---      </text>
  <text class="mono" x="215" y="102" fill="#e95420">    /         \      </text>
  <text class="mono" x="215" y="119" fill="#e95420">   |   /-+--+\ |    </text>
  <text class="mono" x="215" y="136" fill="#e95420">   |  |  | |  |    </text>
  <text class="mono" x="215" y="153" fill="#e95420">    \ \_+--+_/      </text>
  <text class="mono" x="215" y="170" fill="#e95420">      ---(_)---      </text>
  <text class="mono" x="340" y="198" fill="#8b949e" text-anchor="middle">Ubuntu — for the people</text>
</g>

<g class="distro-frame f3">
  <text class="mono" x="230" y="68"  fill="#51a2da">       ,'''''.    </text>
  <text class="mono" x="230" y="85"  fill="#51a2da">      |   \ '    </text>
  <text class="mono" x="230" y="102" fill="#51a2da">      | '  '     </text>
  <text class="mono" x="230" y="119" fill="#51a2da"> ,....|   '      </text>
  <text class="mono" x="230" y="136" fill="#51a2da">(| .'''  |       </text>
  <text class="mono" x="230" y="153" fill="#51a2da"> \       /       </text>
  <text class="mono" x="230" y="170" fill="#51a2da">  '.___.''       </text>
  <text class="mono" x="340" y="198" fill="#8b949e" text-anchor="middle">Fedora — freedom to innovate</text>
</g>

<g class="distro-frame f4">
  <text class="mono" x="250" y="75"  fill="#d70a53">  _____   </text>
  <text class="mono" x="250" y="92"  fill="#d70a53"> /  __ \  </text>
  <text class="mono" x="250" y="109" fill="#d70a53">|  /    | </text>
  <text class="mono" x="250" y="126" fill="#d70a53">|  \___-  </text>
  <text class="mono" x="250" y="143" fill="#d70a53"> \____  ) </text>
  <text class="mono" x="250" y="160" fill="#d70a53">     \_/  </text>
  <text class="mono" x="340" y="192" fill="#8b949e" text-anchor="middle">Debian — the universal OS</text>
</g>

<g class="distro-frame f5">
  <text class="mono" x="195" y="75"  fill="#35bf5c">|||||||   |||||||</text>
  <text class="mono" x="195" y="92"  fill="#35bf5c">|||||||   |||||||</text>
  <text class="mono" x="195" y="109" fill="#35bf5c">|||||||   |||||||</text>
  <text class="mono" x="195" y="126" fill="#35bf5c">|||   |   |   |||</text>
  <text class="mono" x="195" y="143" fill="#35bf5c">|||   |||||   |||</text>
  <text class="mono" x="195" y="160" fill="#35bf5c">|||   |||||   |||</text>
  <text class="mono" x="340" y="192" fill="#8b949e" text-anchor="middle">Manjaro — Arch, but friendly</text>
</g>

<g class="distro-frame f6">
  <text class="mono" x="248" y="68"  fill="#557c94">  .---.   </text>
  <text class="mono" x="248" y="85"  fill="#557c94"> |o_o |   </text>
  <text class="mono" x="248" y="102" fill="#557c94"> |:_/ |   </text>
  <text class="mono" x="248" y="119" fill="#557c94">//   \ \  </text>
  <text class="mono" x="248" y="136" fill="#557c94">(|     | )</text>
  <text class="mono" x="248" y="153" fill="#557c94">/'\_   _/`\</text>
  <text class="mono" x="248" y="170" fill="#557c94">\___)=(___/ </text>
  <text class="mono" x="340" y="198" fill="#8b949e" text-anchor="middle">Kali Linux — for the bold</text>
</g>

<g class="distro-frame f7">
  <text class="mono" x="215" y="75"  fill="#87cf3e"> ___________  </text>
  <text class="mono" x="215" y="92"  fill="#87cf3e">|  _______  | </text>
  <text class="mono" x="215" y="109" fill="#87cf3e">| |       | | </text>
  <text class="mono" x="215" y="126" fill="#87cf3e">| |  mint | | </text>
  <text class="mono" x="215" y="143" fill="#87cf3e">| |_______| | </text>
  <text class="mono" x="215" y="160" fill="#87cf3e">|___________| </text>
  <text class="mono" x="340" y="192" fill="#8b949e" text-anchor="middle">Linux Mint — from freedom, elegance</text>
</g>

</svg>
